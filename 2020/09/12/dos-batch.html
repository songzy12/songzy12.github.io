<h2>%~dp0</h2>

<ul>
<li><code>%0</code>: the batch file itself</li>
<li><code>%1</code>-<code>%9</code>:  command line arguments</li>
<li><code>d</code>: the drive letter</li>
<li><code>p</code>: the path of the parameter</li>
</ul>


<h2>cls</h2>

<p>clean screen.</p>

<h2>findstr</h2>

<p><figure class='code-highlight-figure'><div class='code-highlight'><pre class='code-highlight-pre'><div data-line='1' class='code-highlight-row numbered'><div class='code-highlight-line'>type *.md | findstr &ldquo;&lt;p>&rdquo;</div></div></pre></div></figure></p>

<h2>mode</h2>

<p>Sets the number of lines and columns (characters/line) of the display.</p>

<p><figure class='code-highlight-figure'><div class='code-highlight'><pre class='code-highlight-pre'><div data-line='1' class='code-highlight-row numbered'><div class='code-highlight-line'>mode con cols=100 lines=60</div></div></pre></div></figure></p>
