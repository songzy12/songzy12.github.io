<h2>Char Set</h2>

<ul>
<li>64 base: <code>a-z</code>, <code>A-Z</code>, <code>+</code>, <code>/</code></li>
<li>padding: <code>=</code></li>
</ul>


<h2>Encoding</h2>

<p>Base64 encoding would turn each 3 Bytes group ($3<em>8=24$) to 4 Bytes ($4</em>6=24$), where 6 bits = 2**6 = 64.</p>
