<h2>Windows</h2>

<p>Windows 查看磁盘分区格式</p>

<ol>
<li>按下 <code>Win+R</code> 打开运行，输入 <code>cmd</code>，打开命令提示符；</li>
<li>输入 <code>diskpart</code> 按回车执行，切换到 DISKPART 命令，输入<code>list disk</code>，按回车；</li>
<li>查看最后一列的GPT，如果有*号则为GPT，如果没有则为MBR。</li>
</ol>
