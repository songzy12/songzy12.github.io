<h3>Time O(n), Space O(n)</h3>

<p><figure class='code-highlight-figure'><div class='code-highlight'><pre class='code-highlight-pre'><div data-line='1' class='code-highlight-row numbered'><div class='code-highlight-line'>def convert(s):
</div></div><div data-line='2' class='code-highlight-row numbered'><div class='code-highlight-line'>    res = []
</div></div><div data-line='3' class='code-highlight-row numbered'><div class='code-highlight-line'>    index = 0
</div></div><div data-line='4' class='code-highlight-row numbered'><div class='code-highlight-line'>    for i in range(len(s)):
</div></div><div data-line='5' class='code-highlight-row numbered'><div class='code-highlight-line'>        # abc12123
</div></div><div data-line='6' class='code-highlight-row numbered'><div class='code-highlight-line'>        if s[i] != &lsquo;\b&rsquo;:
</div></div><div data-line='7' class='code-highlight-row numbered'><div class='code-highlight-line'>            if len(res) == index:
</div></div><div data-line='8' class='code-highlight-row numbered'><div class='code-highlight-line'>                res.append(s[i])
</div></div><div data-line='9' class='code-highlight-row numbered'><div class='code-highlight-line'>            else:
</div></div><div data-line='10' class='code-highlight-row numbered'><div class='code-highlight-line'>                res[index] = s[i]
</div></div><div data-line='11' class='code-highlight-row numbered'><div class='code-highlight-line'>            index += 1
</div></div><div data-line='12' class='code-highlight-row numbered'><div class='code-highlight-line'>        else:
</div></div><div data-line='13' class='code-highlight-row numbered'><div class='code-highlight-line'>            if index == 0:
</div></div><div data-line='14' class='code-highlight-row numbered'><div class='code-highlight-line'>                continue
</div></div><div data-line='15' class='code-highlight-row numbered'><div class='code-highlight-line'>            else:
</div></div><div data-line='16' class='code-highlight-row numbered'><div class='code-highlight-line'>                index -= 1
</div></div><div data-line='17' class='code-highlight-row numbered'><div class='code-highlight-line'>        return &lsquo;&rsquo;.join(res[:index])
</div></div><div data-line='18' class='code-highlight-row numbered'><div class='code-highlight-line'> </div></div><div data-line='19' class='code-highlight-row numbered'><div class='code-highlight-line'>def compare(s1, s2):
</div></div><div data-line='20' class='code-highlight-row numbered'><div class='code-highlight-line'>    return convert(s1) == convert(s2)</div></div></pre></div></figure></p>

<h3>Time O(n), Space O(1)</h3>

<p><figure class='code-highlight-figure'><div class='code-highlight'><pre class='code-highlight-pre'><div data-line='1' class='code-highlight-row numbered'><div class='code-highlight-line'>def get_char(s, p):
</div></div><div data-line='2' class='code-highlight-row numbered'><div class='code-highlight-line'>    cnt = 0
</div></div><div data-line='3' class='code-highlight-row numbered'><div class='code-highlight-line'>    while p >= 0 and (cnt > 0 or s[p] == &lsquo;\b&rsquo;):
</div></div><div data-line='4' class='code-highlight-row numbered'><div class='code-highlight-line'>        if s[p] == &lsquo;\b&rsquo;:
</div></div><div data-line='5' class='code-highlight-row numbered'><div class='code-highlight-line'>            cnt += 1
</div></div><div data-line='6' class='code-highlight-row numbered'><div class='code-highlight-line'>        else:
</div></div><div data-line='7' class='code-highlight-row numbered'><div class='code-highlight-line'>            cnt -= 1
</div></div><div data-line='8' class='code-highlight-row numbered'><div class='code-highlight-line'>        p -= 1
</div></div><div data-line='9' class='code-highlight-row numbered'><div class='code-highlight-line'>    return p
</div></div><div data-line='10' class='code-highlight-row numbered'><div class='code-highlight-line'> </div></div><div data-line='11' class='code-highlight-row numbered'><div class='code-highlight-line'>def compare_(s1, s2):
</div></div><div data-line='12' class='code-highlight-row numbered'><div class='code-highlight-line'>        p1 = len(s1) - 1
</div></div><div data-line='13' class='code-highlight-row numbered'><div class='code-highlight-line'>        p2 = len(s2) - 1
</div></div><div data-line='14' class='code-highlight-row numbered'><div class='code-highlight-line'> </div></div><div data-line='15' class='code-highlight-row numbered'><div class='code-highlight-line'>        while p1 >= 0 and p2 >= 0:
</div></div><div data-line='16' class='code-highlight-row numbered'><div class='code-highlight-line'>            p1 = get_char(s1, p1)
</div></div><div data-line='17' class='code-highlight-row numbered'><div class='code-highlight-line'>            p2 = get_char(s2, p2)
</div></div><div data-line='18' class='code-highlight-row numbered'><div class='code-highlight-line'> </div></div><div data-line='19' class='code-highlight-row numbered'><div class='code-highlight-line'>            if p1 >= 0 and p2 >= 0:
</div></div><div data-line='20' class='code-highlight-row numbered'><div class='code-highlight-line'>                if s1[p1] != s2[p2]:
</div></div><div data-line='21' class='code-highlight-row numbered'><div class='code-highlight-line'>                    return False
</div></div><div data-line='22' class='code-highlight-row numbered'><div class='code-highlight-line'>                else:
</div></div><div data-line='23' class='code-highlight-row numbered'><div class='code-highlight-line'>                    p1 -= 1
</div></div><div data-line='24' class='code-highlight-row numbered'><div class='code-highlight-line'>                    p2 -= 1
</div></div><div data-line='25' class='code-highlight-row numbered'><div class='code-highlight-line'> </div></div><div data-line='26' class='code-highlight-row numbered'><div class='code-highlight-line'>        p1 = get_char(s1, p1)
</div></div><div data-line='27' class='code-highlight-row numbered'><div class='code-highlight-line'>        p2 = get_char(s2, p2)
</div></div><div data-line='28' class='code-highlight-row numbered'><div class='code-highlight-line'>        return p1 &lt; 0 and p2 &lt; 0</div></div></pre></div></figure></p>
